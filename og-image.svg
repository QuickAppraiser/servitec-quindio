<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003d7a"/>
      <stop offset="50%" style="stop-color:#0054A6"/>
      <stop offset="100%" style="stop-color:#00A3E0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A3E0"/>
      <stop offset="100%" style="stop-color:#4da6ff"/>
    </linearGradient>
    <linearGradient id="iconbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0054A6"/>
      <stop offset="100%" style="stop-color:#00A3E0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="200" fill="white" opacity="0.05"/>
  <circle cx="150" cy="530" r="150" fill="white" opacity="0.05"/>
  <!-- Shield logo icon -->
  <g transform="translate(100, 170)">
    <rect x="-10" y="-10" width="180" height="180" rx="32" fill="url(#iconbg)" opacity="0.5"/>
    <g transform="translate(15, 10) scale(1.55)" fill="none">
      <path d="M50 3 L91 22 L87 60 C83 77 68 89 50 97 C32 89 17 77 13 60 L9 22 Z" stroke="white" stroke-width="3.5" stroke-linejoin="round" fill="rgba(255,255,255,0.1)"/>
      <path d="M50 10 L84 26 L81 57 C78 71 65 82 50 89 C35 82 22 71 19 57 L16 26 Z" stroke="white" stroke-width="1.2" stroke-linejoin="round" opacity="0.3"/>
      <path d="M50 24 L75 44 L69 44 L69 74 L31 74 L31 44 L25 44 Z" fill="white" opacity="0.95"/>
      <path d="M56 30 L44 52 L51 52 L46 71 L62 46 L54 46 Z" fill="#0054A6"/>
    </g>
  </g>
  <!-- Text -->
  <text x="320" y="260" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" fill="white">ServiTec</text>
  <text x="720" y="260" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="900" fill="#38bdf8"> Quindío</text>
  <text x="320" y="330" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="white" opacity="0.9">Reparación de Electrodomésticos</text>
  <text x="320" y="375" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="white" opacity="0.75">Armenia y Todo el Quindío</text>
  <!-- Divider line -->
